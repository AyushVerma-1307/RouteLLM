<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteLLM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 16px 24px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #e94560;
        }

        .model-select {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .model-select label {
            font-size: 0.875rem;
            color: #888;
        }

        .model-select select {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #0f3460;
            background: #1a1a2e;
            color: #eee;
            font-size: 0.875rem;
            cursor: pointer;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #e94560;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #16213e;
            border: 1px solid #0f3460;
            border-bottom-left-radius: 4px;
        }

        .message.error {
            align-self: flex-start;
            background: #3d1a1a;
            border: 1px solid #e94560;
            color: #ff6b6b;
        }

        .message.meta {
            font-size: 0.75rem;
            color: #666;
            text-align: center;
            align-self: center;
            background: transparent;
            border: none;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            align-self: flex-start;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #e94560;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .input-container {
            padding: 16px 24px;
            background: #16213e;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 12px;
        }

        .input-container input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #0f3460;
            background: #1a1a2e;
            color: #eee;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-container input:focus {
            border-color: #e94560;
        }

        .input-container input::placeholder {
            color: #666;
        }

        .input-container button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            background: #e94560;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .input-container button:hover {
            background: #d63d56;
        }

        .input-container button:active {
            transform: scale(0.98);
        }

        .input-container button:disabled {
            background: #666;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>RouteLLM</h1>
        <div class="model-select">
            <label for="model">Model:</label>
            <select id="model">
                <option value="minimax-m2.5:cloud">minimax-m2.5:cloud</option>
                <option value="minimax-m2.7:cloud">minimax-m2.7:cloud</option>
                <option value="gemma4:31b-cloud">gemma4:31b-cloud</option>
                <option value="llama3.2">llama3.2</option>
            </select>
        </div>
    </div>

    <div class="chat-container" id="chat-container"></div>

    <div class="input-container">
        <input
            type="text"
            id="prompt-input"
            placeholder="Type your message..."
            autocomplete="off"
        >
        <button id="send-btn">Send</button>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        const chatContainer = document.getElementById('chat-container');
        const promptInput = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const modelSelect = document.getElementById('model');

        let isLoading = false;

        function addMessage(content, role, isError = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}${isError ? ' error' : ''}`;
            messageDiv.textContent = content;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.id = 'typing';
            typingDiv.innerHTML = '<span></span><span></span><span></span';
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            if (isLoading) return;

            const prompt = promptInput.value.trim();
            if (!prompt) return;

            const model = modelSelect.value;

            promptInput.value = '';
            addMessage(prompt, 'user');

            isLoading = true;
            sendBtn.disabled = true;
            showTyping();

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, provider: model })
                });

                const data = await response.json();

                hideTyping();

                if (!response.ok) {
                    addMessage(data.detail || 'An error occurred', 'assistant', true);
                } else {
                    addMessage(data.response, 'assistant');
                }
            } catch (error) {
                hideTyping();
                addMessage(`Connection failed: ${error.message}`, 'assistant', true);
            }

            isLoading = false;
            sendBtn.disabled = false;
            promptInput.focus();
        }

        sendBtn.addEventListener('click', sendMessage);

        promptInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        promptInput.focus();
    </script>
</body>
</html>
